user nginx;
worker_processes 1;
error_log /var/log/nginx/error.log warn;
pid /var/run/nginx.pid;

events {
    worker_connections 1024;
}

# Minimal HTTP context required by some nginx builds even when only stream is used.
http {
    access_log off;
}

stream {
    include /etc/nginx/stream.d/*.conf;
}
