name: Test

on:
  push:
    branches: [main, master, develop, proj-check-*]
  pull_request:
    branches: [main, master, develop]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  GO_VERSION: "1.26"
  GOFLAGS: "-buildvcs=false"

permissions:
  contents: read

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1

      - name: Setup Go environment
        uses: ./.github/actions/setup-go-env
        with:
          go-version: ${{ env.GO_VERSION }}

      - name: Run golangci-lint
        uses: golangci/golangci-lint-action@ba0d7d2ec06a0ea1cb5fa41b2e4a3ab91d21278a # v9.3.0
        with:
          version: v2.11.3
          args: --timeout=5m

  test:
    name: Unit Tests
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1

      - name: Setup Go environment
        uses: ./.github/actions/setup-go-env
        with:
          go-version: ${{ env.GO_VERSION }}

      - name: Run tests
        run: go test ./... -race -timeout 2m -coverprofile=coverage.txt -covermode=atomic

      - name: Upload coverage report
        uses: codecov/codecov-action@fb8b3582c8e4def4969c97caa2f19720cb33a72f # v7.0.0
        with:
          files: ./coverage.txt
          fail_ci_if_error: false

  govulncheck:
    name: Vulnerability Check
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1

      - name: Setup Go environment
        uses: ./.github/actions/setup-go-env
        with:
          go-version: ${{ env.GO_VERSION }}

      - name: Prime module graph
        run: go list -deps ./... > /dev/null

      - name: Install govulncheck
        run: go install golang.org/x/vuln/cmd/govulncheck@latest

      - name: Run govulncheck
        run: govulncheck ./...

  vet:
    name: Go Vet
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1

      - name: Setup Go environment
        uses: ./.github/actions/setup-go-env
        with:
          go-version: ${{ env.GO_VERSION }}

      - name: Run go vet
        run: go vet ./...

  staticcheck:
    name: Staticcheck
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1

      - name: Setup Go environment
        uses: ./.github/actions/setup-go-env
        with:
          go-version: ${{ env.GO_VERSION }}

      - name: Install staticcheck
        run: go install honnef.co/go/tools/cmd/staticcheck@v0.7.0

      - name: Run staticcheck
        run: staticcheck ./...

  mod-tidy-check:
    name: Go Mod Tidy Check
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1

      - name: Setup Go environment
        uses: ./.github/actions/setup-go-env
        with:
          go-version: ${{ env.GO_VERSION }}

      - name: Verify go.mod and go.sum are tidy
        run: |
          go mod tidy
          git diff --exit-code go.mod go.sum

  gosec:
    name: Gosec
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1

      - name: Setup Go environment
        uses: ./.github/actions/setup-go-env
        with:
          go-version: ${{ env.GO_VERSION }}

      - name: Install gosec
        run: go install github.com/securego/gosec/v2/cmd/gosec@v2.25.0

      - name: Run gosec
        run: gosec ./...

  e2e:
    name: Docker E2E
    runs-on: ubuntu-latest
    timeout-minutes: 20
    needs: [lint, test, vet, staticcheck, mod-tidy-check, gosec, govulncheck]
    steps:
      - name: Checkout
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1

      - name: Setup Go environment
        uses: ./.github/actions/setup-go-env
        with:
          go-version: ${{ env.GO_VERSION }}
          download-modules: "false"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@bb05f3f5519dd87d3ba754cc423b652a5edd6d2c # v4.2.0

      - name: Run Docker E2E tests
        run: E2E_DOCKER=1 go test ./integration/... -count=1 -timeout 10m -v

  user-connection-e2e:
    # Tier 3 user-connection E2E (real xray client → raven-generated config →
    # traffic flow). Matrix runs each inbound variant in a separate job so a
    # single shape regressing surfaces cleanly. bridge-chain currently skips
    # (not implemented); Reality variants need outbound internet from docker
    # containers and skip gracefully when blocked.
    name: User-Connection E2E (${{ matrix.variant }})
    runs-on: ubuntu-latest
    timeout-minutes: 20
    needs: [lint, test, vet, staticcheck, mod-tidy-check, gosec, govulncheck]
    strategy:
      fail-fast: false
      matrix:
        variant:
          - vless-tcp
          - reality-vision
          - xhttp
          - reality-vision-vlessenc
          - bridge-chain
    steps:
      - name: Checkout
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1

      - name: Setup Go environment
        uses: ./.github/actions/setup-go-env
        with:
          go-version: ${{ env.GO_VERSION }}
          download-modules: "false"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@bb05f3f5519dd87d3ba754cc423b652a5edd6d2c # v4.2.0

      - name: Run Tier 3 user-connection E2E
        env:
          E2E_USER_CONNECTION: "1"
          USER_CONNECTION_VARIANT: ${{ matrix.variant }}
        run: go test ./integration/... -count=1 -timeout 12m -v -run TestUserConnectionE2E

  nginx-frontend-e2e:
    # Tier 4 edge-eu SNI E2E: validates that the Ansible-rendered
    # nginx_frontend stream.conf actually routes SNI → upstream as
    # configured. Day 1 ships destination.com → mock-reality only;
    # additional SNI mappings will be added when the matching mock
    # services land in compose.
    name: Nginx-Frontend SNI E2E
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs: [lint, test, vet, staticcheck, mod-tidy-check, gosec, govulncheck]
    steps:
      - name: Checkout
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1

      - name: Setup Go environment
        uses: ./.github/actions/setup-go-env
        with:
          go-version: ${{ env.GO_VERSION }}
          download-modules: "false"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@bb05f3f5519dd87d3ba754cc423b652a5edd6d2c # v4.2.0

      - name: Run Tier 4 nginx-frontend SNI E2E
        env:
          E2E_NGINX_FRONTEND: "1"
        run: go test ./integration/... -count=1 -timeout 8m -v -run TestNginxFrontendSNI

  nginx-relay-e2e:
    # Tier 4 edge-ru SNI E2E: validates the RU relay → EU frontend 2-hop
    # SNI propagation. Pass-through SNIs land on the right EU upstream;
    # local-domain SNIs terminate on the RU side.
    name: Nginx-Relay SNI E2E
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs: [lint, test, vet, staticcheck, mod-tidy-check, gosec, govulncheck]
    steps:
      - name: Checkout
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1

      - name: Setup Go environment
        uses: ./.github/actions/setup-go-env
        with:
          go-version: ${{ env.GO_VERSION }}
          download-modules: "false"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@bb05f3f5519dd87d3ba754cc423b652a5edd6d2c # v4.2.0

      - name: Run Tier 4 nginx-relay SNI E2E
        env:
          E2E_NGINX_RELAY: "1"
        run: go test ./integration/... -count=1 -timeout 8m -v -run TestNginxRelaySNI

  build:
    name: Build
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs: [lint, test, vet, staticcheck, mod-tidy-check, gosec, govulncheck]
    steps:
      - name: Checkout
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1

      - name: Setup Go environment
        uses: ./.github/actions/setup-go-env
        with:
          go-version: ${{ env.GO_VERSION }}

      - name: Build and verify binary
        run: make test-build

      - name: Upload build artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: xray-subscription
          path: build/xray-subscription
          retention-days: 7
