name: Test

on:
  push:
    branches: [main, master, develop, proj-check-*]
  pull_request:
    branches: [main, master, develop]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  GO_VERSION: "1.26"
  GOFLAGS: "-buildvcs=false"

permissions:
  contents: read

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Setup Go environment
        uses: ./.github/actions/setup-go-env
        with:
          go-version: ${{ env.GO_VERSION }}

      - name: Run golangci-lint
        uses: golangci/golangci-lint-action@1e7e51e771db61008b38414a730f564565cf7c20 # v9.2.0
        with:
          version: v2.11.3
          args: --timeout=5m

  test:
    name: Unit Tests
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Setup Go environment
        uses: ./.github/actions/setup-go-env
        with:
          go-version: ${{ env.GO_VERSION }}

      - name: Run tests
        run: go test ./... -race -timeout 2m -coverprofile=coverage.txt -covermode=atomic

      - name: Upload coverage report
        uses: codecov/codecov-action@57e3a136b779b570ffcdbf80b3bdc90e7fab3de2 # v6.0.0
        with:
          files: ./coverage.txt
          fail_ci_if_error: false

  govulncheck:
    name: Vulnerability Check
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Setup Go environment
        uses: ./.github/actions/setup-go-env
        with:
          go-version: ${{ env.GO_VERSION }}

      - name: Prime module graph
        run: go list -deps ./... > /dev/null

      - name: Install govulncheck
        run: go install golang.org/x/vuln/cmd/govulncheck@latest

      - name: Run govulncheck
        run: govulncheck ./...

  vet:
    name: Go Vet
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Setup Go environment
        uses: ./.github/actions/setup-go-env
        with:
          go-version: ${{ env.GO_VERSION }}

      - name: Run go vet
        run: go vet ./...

  staticcheck:
    name: Staticcheck
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Setup Go environment
        uses: ./.github/actions/setup-go-env
        with:
          go-version: ${{ env.GO_VERSION }}

      - name: Install staticcheck
        run: go install honnef.co/go/tools/cmd/staticcheck@v0.7.0

      - name: Run staticcheck
        run: staticcheck ./...

  mod-tidy-check:
    name: Go Mod Tidy Check
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Setup Go environment
        uses: ./.github/actions/setup-go-env
        with:
          go-version: ${{ env.GO_VERSION }}

      - name: Verify go.mod and go.sum are tidy
        run: |
          go mod tidy
          git diff --exit-code go.mod go.sum

  gosec:
    name: Gosec
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Setup Go environment
        uses: ./.github/actions/setup-go-env
        with:
          go-version: ${{ env.GO_VERSION }}

      - name: Install gosec
        run: go install github.com/securego/gosec/v2/cmd/gosec@v2.25.0

      - name: Run gosec
        run: gosec ./...

  e2e:
    name: Docker E2E
    runs-on: ubuntu-latest
    timeout-minutes: 20
    needs: [lint, test, vet, staticcheck, mod-tidy-check, gosec, govulncheck]
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Setup Go environment
        uses: ./.github/actions/setup-go-env
        with:
          go-version: ${{ env.GO_VERSION }}
          download-modules: "false"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd # v4.0.0

      - name: Run Docker E2E tests
        run: E2E_DOCKER=1 go test ./integration/... -count=1 -timeout 10m -v

  build:
    name: Build
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs: [lint, test, vet, staticcheck, mod-tidy-check, gosec, govulncheck]
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Setup Go environment
        uses: ./.github/actions/setup-go-env
        with:
          go-version: ${{ env.GO_VERSION }}

      - name: Build and verify binary
        run: make test-build

      - name: Upload build artifact
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
        with:
          name: xray-subscription
          path: build/xray-subscription
          retention-days: 7
