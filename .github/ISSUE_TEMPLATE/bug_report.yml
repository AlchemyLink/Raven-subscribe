name: Bug Report
description: Something is broken or not working as expected
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thank you for reporting a bug. Please fill in as much detail as possible.

  - type: textarea
    id: description
    attributes:
      label: What happened?
      description: A clear description of the bug.
      placeholder: Describe the problem...
    validations:
      required: true

  - type: textarea
    id: reproduce
    attributes:
      label: Steps to reproduce
      placeholder: |
        1. Start the server with config...
        2. Call endpoint...
        3. See error
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected behaviour
      placeholder: What did you expect to happen?
    validations:
      required: true

  - type: textarea
    id: environment
    attributes:
      label: Environment
      description: Fill in relevant details.
      value: |
        - OS:
        - Go version:
        - xray-subscription version/commit:
        - Xray-core version:
        - Protocol(s) affected:
    validations:
      required: true

  - type: textarea
    id: logs
    attributes:
      label: Relevant logs or config (sanitised)
      description: Remove any real tokens, passwords, or IPs before pasting.
      render: text
