# Snapshot of Raven-server-install/roles/relay/templates/nginx/stream.conf.j2
# rendered with deterministic Day 3 test values:
#
#   relay_stream_enabled        = true
#   relay_domain                = relay.test.local
#   relay_sub_my                = sub.test.local
#   relay_bridge_enabled        = false
#   relay_transparent_enabled   = false   (Day 3 minimum slice — bridge
#                                          + transparent routing left as
#                                          backlog; revisit when xray-bridge
#                                          gains a test compose profile)
#   relay_https_port            = 8443    (mock-relay-local TLS)
#   relay_upstream_host         = nginx-frontend  (EU compose service)
#   relay_upstream_port         = 443
#
# Refresh: re-render from the j2 template if you change the variables in
# the relay role. The Tier 4 edge-ru SNI test (TestNginxRelaySNI) loads
# this file directly.

map $ssl_preread_server_name $relay_backend {
    relay.test.local  local_https;
    sub.test.local    local_https;
    default           eu_vpn;
}

upstream local_https {
    server mock-relay-local:8443;
}

upstream eu_vpn {
    server nginx-frontend:443;
}

server {
    listen 443 reuseport;
    proxy_pass $relay_backend;
    ssl_preread on;
    proxy_connect_timeout 10s;
    proxy_timeout 60s;
    access_log off;
}
