# Snapshot of Raven-server-install/roles/nginx_frontend/templates/nginx/stream.conf.j2
# rendered with deterministic test values:
#
#   nginx_frontend_stream_v2_enabled       = true
#   nginx_frontend_stream_v2_reality_sni   = destination.com
#   nginx_frontend_stream_v2_reality_port  = 4444
#   nginx_frontend_stream_v2_xhttp_sni     = addons.example
#   nginx_frontend_stream_v2_xhttp_port    = 2054
#   nginx_frontend_stream_fallback_enabled = true
#   nginx_frontend_stream_fallback_port    = 5443
#   nginx_frontend_stream_fallback_snis    = [www.gstatic.com]   # XHTTP fallback, single cover-SNI
#   nginx_frontend_listen_port             = 8443
#   nginx_frontend_domain                  = frontend.test.local
#   nginx_frontend_dashboard_enabled       = false
#   nginx_frontend_sub_enabled             = false
#
# Refresh: re-render from the j2 template if you change variables in the
# Ansible role. The Tier 4 SNI E2E test (TestNginxFrontendSNI in
# integration/) loads this file directly.

# Day 2 SNI matrix: vless_reality_v2 + xhttp_reality_v2 + vless_fallback
# (multi-SNI) + default tcp_close. Dashboard/sub upstreams are optional in
# prod and not yet wired into the test harness — refresh this fixture when
# those mocks land.
map $ssl_preread_server_name $sni_backend {
    destination.com    vless_reality_v2;
    addons.example     xhttp_reality_v2;
    www.gstatic.com    vless_fallback;
    default            tcp_close;
}

upstream tcp_close {
    server 127.0.0.1:1;
}

upstream vless_reality_v2 {
    server mock-reality:4444;
}

upstream xhttp_reality_v2 {
    server mock-xhttp:2054;
}

upstream vless_fallback {
    server mock-fallback:5443;
}

server {
    listen 443 reuseport;
    proxy_pass $sni_backend;
    ssl_preread on;
    proxy_connect_timeout 10s;
    proxy_timeout 60s;
}
